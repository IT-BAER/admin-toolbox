name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish -o bin/Publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        run: iscc installer/AdminToolbox.iss

      - name: Generate SHA256 Checksum
        run: |
          $hash = (Get-FileHash bin/Installer/AdminToolbox-Setup.exe -Algorithm SHA256).Hash
          "$hash  AdminToolbox-Setup.exe" | Out-File -FilePath bin/Installer/SHA256SUMS.txt -Encoding utf8

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Installer/AdminToolbox-Setup.exe
            bin/Installer/SHA256SUMS.txt
